@"
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dockerized Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            font-size: 3em;
        }
        .build-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Deployed with Jenkins + Docker!</h1>
        <p>This website was built automatically by Jenkins and deployed to Heroku.</p>
        <p>Build time: <span id="build-time"></span></p>
    </div>
    <div class="build-info">
        Version: 1.0 | CI/CD Pipeline
    </div>
    <script>
        document.getElementById('build-time').innerHTML = new Date().toLocaleString();
    </script>
</body>
</html>
"@ | Out-File -FilePath index.html -Encoding UTF8
